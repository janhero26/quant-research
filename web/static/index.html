<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quant Research Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            background: #fafafa;
            color: #222;
        }
        h1 { font-size: 1.6rem; }
        h2 { font-size: 1.2rem; margin-top: 40px; }
        table {
            border-collapse: collapse;
            width: 100%;
            margin: 20px 0;
            background: white;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px 12px;
            text-align: right;
        }
        th:first-child, td:first-child { text-align: left; }
        th { background: #f0f0f0; }
        canvas { background: white; padding: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>Quant Research Dashboard</h1>
    <p>Backtest results: strategies vs benchmark on the S&P 500 (2015-2023).</p>

    <table id="results-table">
        <thead>
            <tr>
                <th>Strategy</th>
                <th>CAGR</th>
                <th>Sharpe</th>
                <th>Max Drawdown</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h2>Equity curves</h2>
    <canvas id="equity-chart" width="900" height="450"></canvas>

    <script>
        const colors = {
            benchmark: "#888888",
            momentum: "#e6892b",
            mean_reversion: "#4a90d9",
            low_volatility: "#c0392b"
        };

        async function loadTable() {
            const res = await fetch("/api/results");
            const data = await res.json();
            const tbody = document.querySelector("#results-table tbody");
            data.forEach(row => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${row.strategy}</td>
                    <td>${(row.cagr * 100).toFixed(1)}%</td>
                    <td>${row.sharpe.toFixed(2)}</td>
                    <td>${(row.max_drawdown * 100).toFixed(1)}%</td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function loadEquity() {
            const res = await fetch("/api/equity");
            const data = await res.json();

            // benchmark als referenz fuer die x-achse (labels)
            const labels = data.benchmark.dates;

            const datasets = Object.keys(data).map(name => ({
                label: name,
                data: data[name].equity,
                borderColor: colors[name] || "#333",
                borderWidth: 1.5,
                pointRadius: 0,
                fill: false
            }));

            new Chart(document.getElementById("equity-chart"), {
                type: "line",
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true,
                    interaction: { mode: "index", intersect: false },
                    scales: {
                        x: { ticks: { maxTicksLimit: 10 } },
                        y: { title: { display: true, text: "Portfolio Value" } }
                    }
                }
            });
        }

        loadTable();
        loadEquity();
    </script>
</body>
</html>
